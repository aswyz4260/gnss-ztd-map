<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNSS ZTD site map & charts</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        .left-panel { width: 50%; height: 100%; position: relative; }
        
        /* 右側面板調整為 flex 佈局，讓控制列固定在最上方 */
        .right-panel { width: 50%; height: 100%; display: flex; flex-direction: column; padding: 10px; background: #fdfdfd; gap: 10px; }
        .charts-scroll-container { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        
        #map { width: 100%; height: 100%; }
        .chart-container { flex: 1; min-height: 250px; position: relative; background: white; border: 1px solid #ddd; padding: 8px; border-radius: 4px; }
        
        /* 控制按鈕與統計面板的容器 */
        .control-panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .clear-btn {
            background: white; border: 2px solid #ccc; padding: 8px 15px;
            font-weight: bold; cursor: pointer; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            width: 100%; text-align: center;
        }
        .clear-btn:hover { background: #f4f4f4; border-color: #999; }
        
        /* 統計面板樣式 */
        .stats-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            padding: 10px 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            font-size: 13px;
            color: #333;
            line-height: 1.5;
            pointer-events: none;
            min-width: 140px;
        }
        .stats-title { font-weight: bold; margin-bottom: 4px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
        .stats-std { color: #3355ff; font-weight: bold; }
        .stats-dense { color: #ff3333; font-weight: bold; }

        /* 右側圖表上方的切換開關樣式 */
        .chart-toggle-bar {
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        .switch {
            position: relative; display: inline-block; width: 46px; height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .3s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #28a745; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="control-panel">
                <button class="clear-btn" onclick="clearAllCharts()">全部清除</button>
                <div class="stats-panel">
                    <div class="stats-title">畫面內測站統計</div>
                    <div>Standard: <span id="count-std" class="stats-std">0</span> 個</div>
                    <div>Dense: <span id="count-dense" class="stats-dense">0</span> 個</div>
                </div>
            </div>
            <div id="map"></div>
        </div>
        
        <div class="right-panel">
            <div class="chart-toggle-bar">
                <span>相對變化量 (扣除 08:15 值)</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-relative" onchange="handleToggleChange()">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="charts-scroll-container">
                <div class="chart-container"><canvas id="chartZTD"></canvas></div>
                <div class="chart-container"><canvas id="chartCorrE"></canvas></div>
                <div class="chart-container"><canvas id="chartCorrN"></canvas></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const map = L.map('map').setView([25.0, 121.5], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let timeLabels = [];
        let chartZTD, chartCorrE, chartCorrN;
        let allMarkers = [];
        
        // 用來暫存已點選測站的原始資料與顏色
        let activeStations = []; 

        function syncLegendClick(e, legendItem, legend) {
            const index = legendItem.datasetIndex;
            const charts = [chartZTD, chartCorrE, chartCorrN];
            
            charts.forEach(chart => {
                const meta = chart.getDatasetMeta(index);
                meta.hidden = meta.hidden === null ? !chart.data.datasets[index].hidden : null;
                chart.update();
            });
        }

        function initCharts(labels) {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { 
                        title: { display: true, text: '時間軸 (LST)' },
                        ticks: {
                            color: function(context) {
                                const index = context.index;
                                const label = context.chart.data.labels[index]; 
                                if (label >= '10:15' && label <= '12:45') {
                                    return '#28a745'; 
                                }
                                return '#666666'; 
                            }
                        }
                    } 
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { boxWidth: 12, font: { size: 10 } },
                        onClick: syncLegendClick
                    }
                }
            };

            chartZTD = new Chart(document.getElementById('chartZTD').getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: [] },
                options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { display: true, text: '2022-07-04\nZenith Total Delay (ZTD)' } } }
            });

            chartCorrE = new Chart(document.getElementById('chartCorrE').getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: [] },
                options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { display: true, text: 'CORR_E' } } }
            });

            chartCorrN = new Chart(document.getElementById('chartCorrN').getContext('2d'), {
                type: 'line', data: { labels: labels, datasets: [] },
                options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { display: true, text: 'CORR_N' } } }
            });
        }

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // 使用正規表達式，只保留符合 24小時制 hh:mm 格式的時間標籤
                const timeRegex = /^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$/;
                timeLabels = data.times.filter(label => timeRegex.test(label));
                
                initCharts(timeLabels);

                const denseList = Object.values(data.dense_stations);
                const stdList = Object.values(data.standard_stations);
                const matchedStdIds = new Set();

                denseList.forEach(dense => {
                    const matchedStd = stdList.find(std => 
                        !matchedStdIds.has(std.id) && 
                        Math.abs(dense.lat - std.lat) < 0.0001 && 
                        Math.abs(dense.lon - std.lon) < 0.0001
                    );

                    if (matchedStd) {
                        matchedStdIds.add(matchedStd.id);
                        createSingleMarker(matchedStd, '#3355ff');
                    } else {
                        createSingleMarker(dense, '#ff3333');
                    }
                });

                stdList.forEach(std => {
                    if (!matchedStdIds.has(std.id)) {
                        createSingleMarker(std, '#3355ff');
                    }
                });

                updateVisibleStats();
            })
            .catch(err => console.error("資料加載失敗:", err));

        function createSingleMarker(station, color) {
            const marker = L.circleMarker([station.lat, station.lon], {
                radius: 5, fillColor: color, color: 'transparent', weight: 15, opacity: 0, fillOpacity: 0.9      
            }).addTo(map);

            const typeLabel = station.type === 'dense' ? '<span style="color:#ff3333">Dense</span>' : '<span style="color:#3355ff">Standard</span>';
            const popupContent = `
                <strong>測站類型:</strong> ${typeLabel}<br>
                <strong>測站名稱:</strong> ${station.id}<br>
                <strong>緯度(Lat):</strong> ${station.lat.toFixed(4)}°N<br>
                <strong>經度(Lon):</strong> ${station.lon.toFixed(4)}°E<br>
                <strong>海拔(Alt):</strong> ${station.alt.toFixed(1)} m
            `;
            marker.bindPopup(popupContent);

            marker.on('click', () => {
                // 點擊時，同時保存到 activeStations 陣列
                const exists = activeStations.some(s => s.station.id === station.id);
                if (!exists) {
                    activeStations.push({ station, color });
                }
                addSingleStationToCharts(station, color);
            });

            marker.stationTypes = [station.type];
            allMarkers.push(marker);
        }

        // 處理數值轉換的輔助函式（若開關為 ON，則減去 08:15 的數值）
        function processDataValues(station, key) {
            const originalValues = station[key]; 
            if (!originalValues) return [];
            
            const isRelative = document.getElementById('toggle-relative').checked;
            if (!isRelative) return originalValues;

            // 尋找 08:15 在時間軸中的索引
            const baseIndex = timeLabels.indexOf('08:15');
            if (baseIndex === -1 || originalValues[baseIndex] === undefined) {
                return originalValues; 
            }

            const baseValue = originalValues[baseIndex];
            return originalValues.map(val => val - baseValue);
        }

        function addSingleStationToCharts(station, color) {
            const exists = chartZTD.data.datasets.some(ds => ds.label === station.id);
            if (exists) return;

            const datasetConfig = (dataValues) => ({
                label: station.id,
                data: dataValues,
                borderColor: color,
                backgroundColor: color,
                borderWidth: 2,
                tension: 0.1,
                pointRadius: 1.5
            });

            // 根據目前的開關狀態取得對應的陣列數值
            chartZTD.data.datasets.push(datasetConfig(processDataValues(station, 'ztd')));
            chartCorrE.data.datasets.push(datasetConfig(processDataValues(station, 'corr_e')));
            // 【修正】這裡修復了原先的語法/括號錯誤
            chartCorrN.data.datasets.push(datasetConfig(station.corr_n ? processDataValues(station, 'corr_n') : [])); 

            chartZTD.update();
            chartCorrE.update();
            chartCorrN.update();
        }

        // 當切換開關變更狀態時觸發的重繪邏輯
        function handleToggleChange() {
            // 清空目前圖表上的 dataset
            chartZTD.data.datasets = [];
            chartCorrE.data.datasets = [];
            chartCorrN.data.datasets = [];

            // 重新將暫存的測站資料依據新的開關狀態塞入圖表
            activeStations.forEach(item => {
                addSingleStationToCharts(item.station, item.color);
            });
        }

        function clearAllCharts() {
            activeStations = []; // 同步清空暫存陣列
            chartZTD.data.datasets = [];
            chartCorrE.data.datasets = [];
            chartCorrN.data.datasets = [];
            chartZTD.update();
            chartCorrE.update();
            chartCorrN.update();
        }

        function updateVisibleStats() {
            const bounds = map.getBounds();
            let stdCount = 0;
            let denseCount = 0;

            allMarkers.forEach(marker => {
                if (bounds.contains(marker.getLatLng())) {
                    marker.stationTypes.forEach(type => {
                        if (type === 'standard') stdCount++;
                        if (type === 'dense') denseCount++;
                    });
                }
            });
            
            document.getElementById('count-std').textContent = stdCount;
            document.getElementById('count-dense').textContent = denseCount;
        }

        map.on('moveend', updateVisibleStats);

    </script>
</body>
</html>
